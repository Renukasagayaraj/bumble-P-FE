name: Deploy to Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      description:
        description: 'Optional notes/reason for this manual deployment'
        required: false
        type: string

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./spelling-scholar-fe
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: spelling-scholar-fe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: spelling-scholar-fe/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.DEV_VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.DEV_VITE_SUPABASE_PUBLISHABLE_KEY }}

  deploy:
    name: Deploy to Vercel (Dev)
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./spelling-scholar-fe
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: spelling-scholar-fe

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.DEV_VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.DEV_VITE_API_BASE_URL || secrets.DEV_API_BASE_URL }}" >> .env
          echo "VITE_SENTRY_DSN=${{ secrets.DEV_VITE_SENTRY_DSN || secrets.DEV_SENTRY_DSN }}" >> .env
          echo "VITE_SUPABASE_URL=${{ secrets.DEV_VITE_SUPABASE_URL || secrets.DEV_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.DEV_VITE_SUPABASE_PUBLISHABLE_KEY || secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" >> .env
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.DEV_VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.DEV_VERCEL_PROJECT_ID }}

      - name: Create Deployment Summary
        run: |
          echo "### 🚀 Vercel Dev Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment URL:** [${{ env.DEPLOY_URL }}](${{ env.DEPLOY_URL }})" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.description }}" ]; then
            echo "- **Description/Notes:** ${{ github.event.inputs.description }}" >> $GITHUB_STEP_SUMMARY
          fi
